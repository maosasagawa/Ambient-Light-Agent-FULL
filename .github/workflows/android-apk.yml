name: Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Gradle build type
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
  pull_request:
    branches:
      - main
      - master
    paths:
      - android/**
      - .github/workflows/android-apk.yml
  push:
    branches:
      - main
      - master
    paths:
      - android/**
      - .github/workflows/android-apk.yml
    tags:
      - 'v*'

jobs:
  build-apk:
    name: Build ${{ inputs.build_type || (startsWith(github.ref, 'refs/tags/') && 'release') || 'debug' }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Python 3.10 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode keystore (release only)
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          inputs.build_type == 'release'
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
        run: |
          if [ -n "$SIGNING_KEYSTORE" ]; then
            echo "$SIGNING_KEYSTORE" | base64 --decode > $RUNNER_TEMP/release.jks
            echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV
          fi

      - name: Build APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          BUILD_TYPE="${{ inputs.build_type || (startsWith(github.ref, 'refs/tags/') && 'release') || 'debug' }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew --no-daemon :app:assembleRelease
          else
            ./gradlew --no-daemon :app:assembleDebug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: light-agent-${{ inputs.build_type || (startsWith(github.ref, 'refs/tags/') && 'release') || 'debug' }}-apk
          path: |
            android/app/build/outputs/apk/**/*.apk
            android/app/build/outputs/apk/**/output-metadata.json
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/**/*.apk
