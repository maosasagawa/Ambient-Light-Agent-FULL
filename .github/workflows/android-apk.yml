name: Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Gradle build type
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
      - master
    paths:
      - android/**
      - .github/workflows/android-apk.yml

jobs:
  build-apk:
    name: Build ${{ inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Python 3.10 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: |
          BUILD_TYPE="${{ inputs.build_type || 'debug' }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew --no-daemon :app:assembleRelease
          else
            ./gradlew --no-daemon :app:assembleDebug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: light-agent-${{ inputs.build_type || 'debug' }}-apk
          path: |
            android/app/build/outputs/apk/**/*.apk
            android/app/build/outputs/apk/**/output-metadata.json
          if-no-files-found: error
          retention-days: 14
